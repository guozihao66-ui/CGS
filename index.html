function inferFileType(name="") {
  const n = name.toLowerCase();
  if (n.includes("brief")) return "Brief";
  if (n.includes("memo")) return "Strategy Memo";
  if (n.includes("stakeholder")) return "Stakeholder Notes";
  if (n.includes("baseline") || n.includes("report")) return "Reporting Baseline";
  if (n.includes("workflow")) return "Workflow Notes";
  if (n.includes("pilot")) return "Pilot Ideas";
  if (n.includes("pain")) return "Operating Pain Points";
  return "Uploaded Document";
}

function classifyFromFolder(files, brief, scenarioId) {
  if (scenarioId === "ai") return "ai";
  if (scenarioId === "inertia") return "inertia";
  if (scenarioId === "standardization") return "standardization";
  const text = `${brief.clientName||""} ${brief.industry||""} ${brief.objective||""} ${brief.challenge||""} ${files.map(f => `${f.name} ${f.content}`).join(" ")}`.toLowerCase();
  if (text.includes("ai") || text.includes("use case") || text.includes("manufacturer") || text.includes("automation")) return "ai";
  if (text.includes("stalled") || text.includes("sponsor") || text.includes("governance") || text.includes("decision rights") || text.includes("momentum")) return "inertia";
  return "standardization";
}

  const col = done || active ? (done ? "#fff" : "#a5b4fc") : "rgba(255,255,255,0.25)";
  return (
    <div style={{width:32,height:32,borderRadius:"50%",background:bg,border:`1px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"center",color:col,fontSize:13,fontWeight:700,transition:"all .3s",flexShrink:0}}>
      {done ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg> : num}
    </div>
  );
}

function IssueNode({ node, depth=0 }) {
  const [open, setOpen] = useState(depth < 1);
  const has = node.children && node.children.length > 0;
  const bg = depth===0 ? "rgba(99,102,241,0.12)" : depth===1 ? "rgba(255,255,255,0.04)" : "transparent";
  const border = depth===0 ? "rgba(99,102,241,0.25)" : depth===1 ? "rgba(255,255,255,0.07)" : "transparent";
  const col = depth===0 ? "#e0e7ff" : depth===1 ? "rgba(255,255,255,0.75)" : "rgba(255,255,255,0.45)";
  return (
    <div style={{marginLeft: depth>0 ? 20 : 0, position:"relative"}}>
      {depth>0 && <div style={{position:"absolute",left:-16,top:0,width:1,height:20,background:"rgba(99,102,241,0.2)"}}/>}
      {depth>0 && <div style={{position:"absolute",left:-16,top:16,width:16,height:1,background:"rgba(99,102,241,0.2)"}}/>}
      <div onClick={()=>has&&setOpen(!open)} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 12px",borderRadius:10,marginBottom:4,background:bg,border:`1px solid ${border}`,color:col,fontSize:depth===0?13:depth===1?12:11,fontWeight:depth===0?600:400,cursor:has?"pointer":"default",transition:"all .15s"}}>
        {has && <svg style={{width:12,height:12,marginTop:1,flexShrink:0,transition:"transform .2s",transform:open?"rotate(90deg)":"none",color:"#818cf8"}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>}
        {!has && <div style={{width:6,height:6,borderRadius:"50%",background:"rgba(99,102,241,0.5)",marginTop:5,flexShrink:0}}/>}
        <span>{node.label}</span>
      </div>
      {open && has && node.children.map((c,i)=><IssueNode key={i} node={c} depth={depth+1}/>)}
    </div>
  );
}

  const [tab, setTab] = useState("problem");
  const data = buildFolderAwareScenario(brief, clientFolder, scenarioId);
  useEffect(()=>{ const t=setTimeout(()=>setReady(true),2200); return()=>clearTimeout(t); },[]);

  if (!ready) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"65vh",gap:24}}>
      <div style={{position:"relative",width:80,height:80}}>
        <div className="spin" style={{position:"absolute",inset:0,borderRadius:"50%",border:"1px solid rgba(99,102,241,0.2)"}}/>
        <div className="spin-rev" style={{position:"absolute",inset:8,borderRadius:"50%",border:"1px solid rgba(139,92,246,0.25)"}}/>
        <div style={{position:"absolute",inset:18,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
      </div>
      <div style={{textAlign:"center"}}>
        <p style={{color:"#fff",fontSize:18,fontWeight:700,marginBottom:8}}>Crafting the first pair…</p>

          <p key={i} style={{fontSize:13,color:"rgba(255,255,255,0.3)",lineHeight:1.9}}>{msg}</p>
        ))}
      </div>
    </div>
  );

  const tabs = [
    { id:"problem", label:"Problem Statement" },
    { id:"issues", label:"Issue Tree" },
    { id:"workstreams", label:"Workstreams" },
    { id:"roadmap", label:"30/60/90 Roadmap" },
    { id:"exec", label:"Exec Summary" },
    { id:"slide", label:"First-Slide Outline" },

  return (
    <div className="fade-in" style={{maxWidth:900,margin:"0 auto",padding:"48px 24px"}}>
      <div style={{marginBottom:32}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap"}}>
          <p style={{fontSize:11,letterSpacing:"0.12em",color:"#818cf8",textTransform:"uppercase",fontWeight:700}}>Step 03 — Starter Pack</p>
          <Badge color="emerald">First Pair Drafted</Badge>
          <Badge color="slate">Scenario: {scenarioId || "standardization"}</Badge>
        </div>
        <h1 style={{fontSize:32,fontWeight:800,color:"#fff",marginBottom:8}}>{brief.clientName||"Engagement"} — Starter Pack</h1>
        <p style={{color:"rgba(255,255,255,0.45)",fontSize:14}}>AI-generated from brief + activated knowledge. Review each section before proceeding to wear-test.</p>
      </div>

      <div style={{marginBottom:24,padding:18,borderRadius:16,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Engagement Archetype Recommendation</p>
            <p style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:6}}>{data.dynamicMeta.starterKitLabel}</p>
            <p style={{fontSize:12,color:"rgba(255,255,255,0.55)",lineHeight:1.8}}>Firm-level methods stay the same, but the active client folder changes what gets emphasized in the starter kit.</p>
          </div>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Retrieved Client Files</p>
            {data.topFiles.map(file => (
              <div key={file.name} style={{fontSize:11,color:"rgba(255,255,255,0.42)",marginBottom:7}}>
                <strong style={{color:"rgba(255,255,255,0.7)"}}>{file.name}</strong> · {file.type}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{display:"flex",gap:4,padding:4,background:"rgba(255,255,255,0.04)",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",marginBottom:24,overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flexShrink:0,padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .2s",border:"none",background:tab===t.id?"#6366f1":"transparent",color:tab===t.id?"#fff":"rgba(255,255,255,0.4)",whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div className="fade-in" key={tab} style={{minHeight:360}}>
        {tab==="problem" && (
          <div style={{padding:24,borderRadius:20,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:28,height:28,borderRadius:8,background:"rgba(99,102,241,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </div>
              <h3 style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>Draft Problem Statement</h3>
            </div>
            <p style={{color:"rgba(255,255,255,0.7)",fontSize:14,lineHeight:1.9,borderLeft:"3px solid rgba(99,102,241,0.4)",paddingLeft:16}}>{data.SP.problemStatement}</p>
            <p style={{marginTop:16,fontSize:11,color:"rgba(255,255,255,0.25)"}}>Generated from firm-library logic + current client-folder evidence</p>
          </div>
        )}
        {tab==="issues" && (
          <div style={{padding:24,borderRadius:20,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:28,height:28,borderRadius:8,background:"rgba(139,92,246,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c4b5fd" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 10h16M4 14h10M4 18h6"/></svg>
              </div>
              <h3 style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>Issue Tree</h3>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.25)"}}>Click to expand branches</span>
            </div>
            <IssueNode node={data.SP.issueTree} depth={0}/>
          </div>
        )}
        {tab==="workstreams" && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {data.SP.workstreams.map(ws=>(
              <div key={ws.id} style={{padding:20,borderRadius:16,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",display:"flex",gap:16,alignItems:"flex-start"}}>
                <div style={{width:3,borderRadius:99,background:ws.color,alignSelf:"stretch",flexShrink:0,minHeight:60}}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,fontWeight:700,color:"#fff"}}>{ws.name}</span>
                    <Badge color="slate">{ws.weeks}</Badge>
                  </div>
                  <p style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:12}}>Deliverable: <strong style={{color:"rgba(255,255,255,0.6)"}}>{ws.deliverable}</strong></p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {ws.activities.map((a,i)=>(
                      <span key={i} style={{fontSize:11,padding:"4px 10px",borderRadius:6,background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.07)"}}>{a}</span>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
        {tab==="roadmap" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
            {data.SP.roadmap.map((p,i)=>(
              <div key={i} style={{padding:20,borderRadius:16,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
                <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:10,background:p.color+"22",fontSize:13,fontWeight:800,color:p.color,marginBottom:4}}>{p.label}</div>
                <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:16,paddingLeft:2}}>{p.subtitle}</p>
                <ul style={{listStyle:"none"}}>
                  {p.items.map((item,j)=>(
                    <li key={j} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:10}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:p.color,flexShrink:0,marginTop:5}}/>
                      {item}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        )}
        {tab==="exec" && (
          <div style={{padding:24,borderRadius:20,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:28,height:28,borderRadius:8,background:"rgba(16,185,129,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
              </div>
              <h3 style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>Executive Summary Draft</h3>
            </div>
            <div style={{padding:20,borderRadius:16,background:"rgba(16,185,129,0.05)",border:"1px solid rgba(16,185,129,0.15)",marginBottom:16}}>
              <p style={{color:"rgba(255,255,255,0.8)",fontSize:14,lineHeight:1.9,fontStyle:"italic"}}>"{data.SP.execSummary}"</p>
            </div>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.25)"}}>AI-generated first-draft. Not a final deliverable — review before sharing with client.</p>
          </div>
        )}
        {tab==="slide" && (
          <div style={{padding:24,borderRadius:20,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:28,height:28,borderRadius:8,background:"rgba(245,158,11,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fcd34d" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
              </div>
              <h3 style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>Suggested Deck Outline</h3>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {data.SP.slidesDetailed && data.SP.slidesDetailed.length ? data.SP.slidesDetailed.map((s,i)=>(
                <div key={i} style={{padding:"14px 16px",borderRadius:14,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:"#6366f1",width:52,flexShrink:0}}>{s.slide}</span>
                    <p style={{fontSize:13,color:"#fff",fontWeight:700}}>{s.title}</p>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"88px 1fr",rowGap:10,columnGap:10}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>Purpose</span>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.7}}>{s.purpose}</span>
                    <span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>Key message</span>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.7}}>{s.keyMessage}</span>
                    <span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>Visual</span>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.7}}>{s.visual}</span>
                  </div>
                </div>
              )) : data.SP.slides.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,background:s.type==="title"?"rgba(245,158,11,0.1)":s.type==="subtitle"?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.015)",border:`1px solid ${s.type==="title"?"rgba(245,158,11,0.25)":"rgba(255,255,255,0.06)"}`}}>
                  <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:s.type==="title"?"#fcd34d":s.type==="subtitle"?"rgba(255,255,255,0.25)":"rgba(99,102,241,0.7)",width:52,flexShrink:0}}>{s.type==="title"?"Title":s.type==="subtitle"?"Subtitle":`Slide ${i-1}`}</span>
                  <p style={{fontSize:13,color:s.type==="title"?"#fff":s.type==="subtitle"?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.7)",fontWeight:s.type==="title"?700:400}}>{s.text}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <button onClick={onNext} style={{marginTop:32,width:"100%",padding:"15px 0",borderRadius:14,fontSize:14,fontWeight:700,letterSpacing:"0.03em",cursor:"pointer",border:"none",background:"#6366f1",color:"#fff",boxShadow:"0 8px 24px rgba(99,102,241,0.3)",transition:"all .2s"}}>
        Wear-Test Review →
      </button>
    </div>
  );
}

// ── Screen 4 ─────────────────────────────────────────────────────────────────

function ScreenReview({ brief, clientFolder, scenarioId }) {
  const data = buildFolderAwareScenario(brief, clientFolder, scenarioId);
  const [flags, setFlags] = useState(data.dynamicReviewFlags);
  const [exported, setExported] = useState(false);
  const update = (id, status) => setFlags(prev=>prev.map(f=>f.id===id?{...f,status}:f));
  const pending = flags.filter(f=>f.status==="pending").length;
  const approved = flags.filter(f=>f.status==="approved").length;
  const escalated = flags.filter(f=>f.status==="escalated").length;

  const confidence = data.dynamicMeta.workflowLabel.includes("AI")
    ? [
        { label:"Problem Statement", score:86 },
        { label:"Issue Tree", score:84 },
        { label:"Workstream Structure", score:90 },
        { label:"30/60/90 Roadmap", score:83 },
        { label:"Executive Summary", score:84 },
        { label:"Deck Outline", score:91 },
      ]
    : data.dynamicMeta.workflowLabel.includes("Inertia")
      ? [
          { label:"Problem Statement", score:89 },
          { label:"Issue Tree", score:87 },
          { label:"Workstream Structure", score:88 },
          { label:"30/60/90 Roadmap", score:85 },
          { label:"Executive Summary", score:90 },
          { label:"Deck Outline", score:92 },
        ]
      : [
          { label:"Problem Statement", score:88 },
          { label:"Issue Tree", score:82 },
          { label:"Workstream Structure", score:91 },
          { label:"30/60/90 Roadmap", score:79 },
          { label:"Executive Summary", score:85 },
          { label:"Deck Outline", score:90 },
        ];

  return (
    <div className="fade-in" style={{maxWidth:900,margin:"0 auto",padding:"48px 24px"}}>
      <div style={{marginBottom:32}}>
        <p style={{fontSize:11,letterSpacing:"0.12em",color:"#818cf8",textTransform:"uppercase",fontWeight:700,marginBottom:12}}>Step 04 — Wear-Test Review</p>
        <h1 style={{fontSize:32,fontWeight:800,color:"#fff",marginBottom:8}}>Does the first pair fit?</h1>
        <p style={{color:"rgba(255,255,255,0.45)",fontSize:15}}>Review Cobbler's assumptions and confirm, revise, or escalate before exporting the starter pack.</p>
      </div>

      <div style={{padding:18,borderRadius:16,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",marginBottom:24}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Human Review Required</p>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.6)",lineHeight:1.8}}>{data.dynamicMeta.evidenceReason}</p>
          </div>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Evidence Used</p>
            {data.topFiles.map(file => (
              <div key={file.name} style={{fontSize:11,color:"rgba(255,255,255,0.42)",marginBottom:7}}>
                <strong style={{color:"rgba(255,255,255,0.68)"}}>{file.name}</strong> · {file.type}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Summary bar */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:32}}>
        {[{label:"Pending Review",val:pending,color:"amber"},{label:"Approved",val:approved,color:"emerald"},{label:"Escalated",val:escalated,color:"rose"}].map(s=>(
          <div key={s.label} style={{padding:16,borderRadius:14,border:`1px solid ${s.color==="amber"?"rgba(245,158,11,0.2)":s.color==="emerald"?"rgba(16,185,129,0.2)":"rgba(244,63,94,0.2)"}`,background:s.color==="amber"?"rgba(245,158,11,0.05)":s.color==="emerald"?"rgba(16,185,129,0.05)":"rgba(244,63,94,0.05)",textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:800,color:s.color==="amber"?"#fcd34d":s.color==="emerald"?"#6ee7b7":"#fda4af",marginBottom:2}}>{s.val}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Flags */}
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:32}}>
        {flags.map(flag=>(
          <div key={flag.id} style={{padding:20,borderRadius:16,border:`1px solid ${flag.status==="approved"?"rgba(16,185,129,0.2)":flag.status==="escalated"?"rgba(244,63,94,0.25)":flag.sev==="high"?"rgba(245,158,11,0.2)":flag.sev==="medium"?"rgba(255,255,255,0.09)":"rgba(255,255,255,0.05)"}`,background:flag.status==="approved"?"rgba(16,185,129,0.04)":flag.status==="escalated"?"rgba(244,63,94,0.05)":flag.sev==="high"?"rgba(245,158,11,0.04)":"rgba(255,255,255,0.025)",transition:"all .25s",opacity:flag.status==="approved"?0.7:1}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,marginTop:6,background:flag.sev==="high"?"#f59e0b":flag.sev==="medium"?"#818cf8":"rgba(255,255,255,0.3)"}}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                  <span style={{fontSize:14,fontWeight:700,color:"#fff"}}>{flag.label}</span>
                  <Badge color={flag.sev==="high"?"amber":flag.sev==="medium"?"indigo":"slate"}>{flag.sev} priority</Badge>
                  {flag.status==="approved"&&<Badge color="emerald">Approved</Badge>}
                  {flag.status==="escalated"&&<Badge color="rose">Escalated</Badge>}
                </div>
                <p style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.7}}>{flag.detail}</p>
              </div>
              {flag.status==="pending" && (
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <button onClick={()=>update(flag.id,"approved")} style={{padding:"6px 12px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",border:"1px solid rgba(16,185,129,0.3)",background:"rgba(16,185,129,0.12)",color:"#6ee7b7",transition:"all .15s"}}>Approve</button>
                  <button onClick={()=>update(flag.id,"escalated")} style={{padding:"6px 12px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",border:"1px solid rgba(244,63,94,0.25)",background:"rgba(244,63,94,0.08)",color:"#fda4af",transition:"all .15s"}}>Escalate</button>
                </div>
              )}
              {flag.status!=="pending" && (
                <button onClick={()=>update(flag.id,"pending")} style={{fontSize:11,color:"rgba(255,255,255,0.2)",background:"none",border:"none",cursor:"pointer",flexShrink:0}}>undo</button>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Confidence */}
      <div style={{padding:20,borderRadius:16,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",marginBottom:32}}>
        <p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:20}}>Pack Confidence Indicators</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"12px 32px"}}>
          {confidence.map(c=>(
            <div key={c.label}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
                <span style={{color:"rgba(255,255,255,0.5)"}}>{c.label}</span>
                <span style={{fontWeight:700,color:c.score>=85?"#10b981":c.score>=75?"#f59e0b":"#f43f5e"}}>{c.score}%</span>
              </div>
              <FitBar value={c.score} color={c.score>=85?"#10b981":c.score>=75?"#f59e0b":"#f43f5e"}/>
            </div>
          ))}
        </div>
      </div>

      {!exported ? (
        <div style={{padding:32,borderRadius:20,border:"1px dashed rgba(99,102,241,0.3)",background:"rgba(99,102,241,0.04)",textAlign:"center"}}>
          <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(99,102,241,0.15)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#818cf8" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <p style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}}>Ready to export your starter pack?</p>
          <p style={{fontSize:13,color:"rgba(255,255,255,0.35)",marginBottom:24}}>{pending===0?"All flags resolved. Your pack is ready for export.":`${pending} flag${pending!==1?"s":""} still pending. You can export anyway or resolve them first.`}</p>
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setExported(true)} style={{padding:"11px 28px",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",border:"none",background:"#6366f1",color:"#fff",boxShadow:"0 8px 24px rgba(99,102,241,0.3)",transition:"all .2s"}}>Export Starter Pack</button>
            <button style={{padding:"11px 28px",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.6)",transition:"all .2s"}}>Send to Senior Review</button>
          </div>
        </div>
      ) : (
        <div style={{padding:32,borderRadius:20,border:"1px solid rgba(16,185,129,0.3)",background:"rgba(16,185,129,0.05)",textAlign:"center"}}>
          <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(16,185,129,0.2)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>
          </div>
          <p style={{fontSize:15,fontWeight:800,color:"#fff",marginBottom:4}}>Starter pack exported.</p>
          <p style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:20}}>{brief.clientName||"Engagement"} starter pack is ready in your project workspace.</p>
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
            {["Problem Statement.docx","Issue Tree.pdf","Roadmap.pptx"].map(f=>(
              <span key={f} style={{fontSize:11,padding:"6px 12px",borderRadius:8,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.4)"}}>{f}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Shell ─────────────────────────────────────────────────────────────────────

const STEPS = [
  { id:1, label:"Brief Intake", sub:"Measure the client" },
  { id:2, label:"Knowledge Activation", sub:"Pattern matching" },
  { id:3, label:"Starter Pack", sub:"First pair drafted" },
  { id:4, label:"Wear-Test Review", sub:"Confirm the fit" },
];

function App() {
  const [step, setStep] = useState(1);
  const [brief, setBrief] = useState({});
  const [clientFolder, setClientFolder] = useState(CLIENT_FOLDERS[0]);
  const [uploadedFiles, setUploadedFiles] = useState([]);
  const [scenarioId, setScenarioId] = useState("standardization");

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#090a13 0%,#0e0f1f 50%,#0a0b18 100%)",position:"relative",overflow:"hidden"}}>
      {/* Ambient glow */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",background:"radial-gradient(ellipse 70% 45% at 50% 0%,rgba(99,102,241,0.09) 0%,transparent 70%)"}}/>

      {/* Header */}
      <header style={{position:"relative",zIndex:10,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(0,0,0,0.2)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <div style={{maxWidth:980,margin:"0 auto",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:20}}>
          {/* Brand */}
          <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(99,102,241,0.35)"}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <div>
              <span style={{fontSize:14,fontWeight:800,color:"#fff",letterSpacing:"-0.02em"}}>CGS Cobbler</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginLeft:10,fontStyle:"italic",display:"none"}}>The first pair of shoes CGS builds for itself.</span>
            </div>
          </div>

          {/* Steps */}
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,justifyContent:"center",maxWidth:600}}>
            {STEPS.map((s,i)=>(
              <React.Fragment key={s.id}>
                <button onClick={()=>s.id<=step&&setStep(s.id)} disabled={s.id>step} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:s.id<=step?"pointer":"default",padding:0}}>
                  <StepDot num={s.id} active={step===s.id} done={step>s.id}/>
                  <span style={{fontSize:12,fontWeight:600,color:step===s.id?"#fff":step>s.id?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.18)",whiteSpace:"nowrap",display:window.innerWidth<600?"none":"block"}}>{s.label}</span>
                </button>
                {i<STEPS.length-1 && <div style={{width:32,height:1,background:step>s.id?"rgba(99,102,241,0.4)":"rgba(255,255,255,0.08)",flexShrink:0,display:window.innerWidth<600?"none":"block"}}/>}
              </React.Fragment>
            ))}
          </div>

          {/* User */}
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"rgba(99,102,241,0.25)",border:"1px solid rgba(99,102,241,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#a5b4fc"}}>CG</div>
            <div>
              <p style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.65)",lineHeight:1}}>Consultant</p>
              <p style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>CGS Advisors</p>
            </div>
          </div>
        </div>
      </header>

      {/* Progress bar */}
      <div style={{height:2,background:"rgba(255,255,255,0.04)",position:"relative",zIndex:10}}>
        <div style={{height:"100%",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",transition:"width .5s ease",width:`${((step-1)/(STEPS.length-1))*100}%`}}/>
      </div>

      {/* Main */}
      <main style={{position:"relative",zIndex:5}}>
        {step===1 && <ScreenIntake brief={brief} setBrief={setBrief} onNext={()=>setStep(2)} clientFolder={clientFolder} setClientFolder={setClientFolder} uploadedFiles={uploadedFiles} setUploadedFiles={setUploadedFiles} setScenarioId={setScenarioId}/>}
        {step===2 && <ScreenKnowledge brief={brief} onNext={()=>setStep(3)} clientFolder={clientFolder} scenarioId={scenarioId}/>}
        {step===3 && <ScreenStarterPack brief={brief} onNext={()=>setStep(4)} clientFolder={clientFolder} scenarioId={scenarioId}/>}
        {step===4 && <ScreenReview brief={brief} clientFolder={clientFolder} scenarioId={scenarioId}/>}
      </main>

      {/* Footer */}
      <footer style={{borderTop:"1px solid rgba(255,255,255,0.05)",marginTop:32,position:"relative",zIndex:5}}>
        <div style={{maxWidth:980,margin:"0 auto",padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.18)"}}>CGS Cobbler · Internal Use Only · CGS Advisors</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.12)",fontStyle:"italic"}}>
            {step===1?"Start crafting":step===2?"Knowledge patterns activated":step===3?"First pair drafted":"Measure the fit"}
          </span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
