  .card {

  .small { font-size: 12px; }
  .tiny { font-size: 11px; }
  .divider { height: 1px; background: var(--line); margin: 4px 0; }
  .two-col { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
  .three-col { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }

  @media (max-width: 1180px) {

</style>

<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const FIRM_LIBRARY = {

const PRESET_CLIENTS = [
  {
    id: 'ps-standardization',
    label: 'CrestPoint Advisory',
    folderName: 'CrestPoint / Delivery Standardization',
    sourceType: 'Google Drive Client Folder',
    lastRefreshed: '12 Apr 2026, 18:11 EDT',
    files: [
      { name: 'Client Brief - delivery startup variation.docx', type: 'Brief', content: 'Professional services firm. Delivery startup varies by team. Consultants rebuild workplans from old decks. Leadership wants reusable startup kits, quality gates, governance, interview guides, and consistency without removing partner judgment. Baseline metrics for startup time are partial. Stakeholder list includes COO and practice leads.' },
      { name: 'Workflow Notes - kickoff pain points.txt', type: 'Workflow Notes', content: 'Teams search across folders, decks, and templates. Junior consultants lack a clear starting point. Existing methods are reusable but scattered. No single owner for starter kit governance.' },
      { name: 'Reporting Baseline - startup cycle.xlsx', type: 'Reporting Baseline', content: 'Partial baseline metrics. Startup time ranges from 6 to 16 days by practice. Rework appears high. Quantification still incomplete.' },
      { name: 'Stakeholder Notes - practice leaders.docx', type: 'Stakeholder Notes', content: 'COO is active sponsor. Practice leads support standardization but want flexibility. Need stronger review gate for client-facing storyline and recommendation language.' },
    ]
  },
  {
    id: 'industrial-ai',
    label: 'Northstar Components',
    folderName: 'Northstar Components / AI Transformation',
    sourceType: 'Google Drive Client Folder',
    lastRefreshed: '12 Apr 2026, 18:12 EDT',
    files: [
      { name: 'Strategy Memo - AI planning and reporting.docx', type: 'Strategy Memo', content: 'Industrial manufacturer with AI ambition across planning, reporting, workflow coordination. COO needs a practical first wave in 6 months. Data ownership is fragmented and reporting practices are inconsistent.' },
      { name: 'Ops Workflow Notes - plant coordination.txt', type: 'Workflow Notes', content: 'Workflow handoffs between plants and central planning are inconsistent. Teams manage exceptions manually. Readiness for automation differs by site.' },
      { name: 'Pilot Ideas - use cases.csv', type: 'Pilot Ideas', content: 'Potential use cases include predictive scheduling, production reporting assistant, maintenance planning support, workflow exception triage. Need feasibility scoring.' },
      { name: 'Stakeholder Notes - transformation sponsors.docx', type: 'Stakeholder Notes', content: 'COO is sponsor. IT supports the effort. Plant leaders want practical pilots. Baseline value metrics are weak and partially estimated.' },
    ]
  },
  {
    id: 'enterprise-inertia',
    label: 'Apex Enterprise Group',
    folderName: 'Apex Enterprise Group / Transformation Stall',
    sourceType: 'Google Drive Client Folder',
    lastRefreshed: '12 Apr 2026, 18:13 EDT',
    files: [
      { name: 'Transformation Brief - stalled momentum.docx', type: 'Brief', content: 'Large enterprise transformation has stalled. Executive team wants to become more digital and integrated. Governance meetings end without decisions. Accountability is unclear and the first-wave roadmap is overloaded.' },
      { name: 'Stakeholder Notes - executive interviews.docx', type: 'Stakeholder Notes', content: 'CEO wants speed. Operations wants process discipline. Technology wants data foundations. Business leaders want quick wins. Sponsor model is unresolved.' },
      { name: 'Operating Pain Points - governance log.txt', type: 'Operating Pain Points', content: 'Multiple steering forums exist. Decision rights are blurry. Initiatives compete for attention and no one owns sequencing.' },
      { name: 'Baseline Notes - current KPIs.txt', type: 'Reporting Baseline', content: 'Transformation KPIs exist at a headline level but linkage to first-wave actions is weak. Benefits case is qualitative.' },
    ]
  }
];

const INITIAL_BRIEF = 'A client team wants CGS to assemble a sharper engagement startup package by combining reusable consulting methods with company-specific context from its current folder.';

const STOPWORDS = new Set(['the','and','for','with','that','this','from','into','their','they','have','will','without','want','wants','where','there','across','into','about','client','current','using','used','only','more','less','than','your','team','teams','week','weeks','file','files']);

function tokenize(text = '') {
  return text
    .toLowerCase()
    .replace(/[^a-z0-9\s-]/g, ' ')
    .split(/\s+/)
    .filter(Boolean)
    .filter(word => word.length > 2 && !STOPWORDS.has(word));
}

function sentenceChunks(text = '') {
  return text.split(/[\n\.\!\?]+/).map(s => s.trim()).filter(Boolean);
}

function inferFileType(name = '') {
  const n = name.toLowerCase();
  if (n.includes('brief')) return 'Brief';
  if (n.includes('memo')) return 'Strategy Memo';
  if (n.includes('stakeholder')) return 'Stakeholder Notes';
  if (n.includes('baseline') || n.includes('report')) return 'Reporting Baseline';
  if (n.includes('workflow')) return 'Workflow Notes';
  if (n.includes('pain')) return 'Operating Pain Points';
  if (n.includes('pilot')) return 'Pilot Ideas';
  return 'Uploaded Document';
}

function topKeywords(files) {
  const counts = {};
  files.forEach(file => {
    tokenize(`${file.name} ${file.content}`).forEach(word => counts[word] = (counts[word] || 0) + 1);
  });
  return Object.entries(counts)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 8)
    .map(([word]) => word);
}

function classifyContext(files, briefText) {
  const text = `${briefText} ${files.map(f => `${f.name} ${f.content}`).join(' ')}`.toLowerCase();
  const score = {
    standardization: 0,
    ai: 0,
    inertia: 0,
  };

  const bump = (bucket, words, value) => words.forEach(word => { if (text.includes(word)) score[bucket] += value; });

  bump('standardization', ['professional services', 'template', 'templates', 'standardize', 'standardization', 'starter kit', 'reusable', 'workplan', 'quality gate', 'delivery variation', 'junior consultants'], 3);
  bump('standardization', ['kickoff', 'manual reconstruction', 'scattered', 'deck', 'governance'], 2);

  bump('ai', ['ai', 'artificial intelligence', 'use case', 'pilot', 'planning', 'reporting', 'workflow coordination', 'data ownership', 'automation'], 3);
  bump('ai', ['manufacturer', 'plant', 'readiness', 'feasibility', 'coo', 'value'], 2);

  bump('inertia', ['stalled', 'inertia', 'governance meeting', 'decision rights', 'sponsor', 'sponsorship', 'accountability', 'overloaded', 'transformation'], 3);
  bump('inertia', ['momentum', 'executive', 'quick wins', 'alignment', 'sequencing'], 2);

  const ranking = Object.entries(score).sort((a,b) => b[1] - a[1]);
  const primary = ranking[0][0];
  const confidence = Math.min(97, 62 + ranking[0][1] * 4);
  return { primary, confidence, score };
}

function buildAnalysis(folder, briefText) {
  const files = folder.files;
  const keywords = topKeywords(files);
  const classification = classifyContext(files, briefText);
  const hasBaseline = files.some(f => /baseline|metric|kpi|reporting/i.test(`${f.name} ${f.content}`));
  const hasStakeholders = files.some(f => /stakeholder|sponsor|executive|practice lead|coo|ceo/i.test(`${f.name} ${f.content}`));
  const hasWeakEvidence = files.some(f => /partial|weak|estimated|qualitative|incomplete/i.test(f.content));
  const hasGovernanceRisk = files.some(f => /governance|decision rights|owner|ownership|review gate/i.test(f.content));
  const fileTypes = [...new Set(files.map(f => f.type || inferFileType(f.name)))];

  const evidence = files.map(file => {
    const chunks = sentenceChunks(file.content);
    const matchedSignals = [];
    chunks.forEach(chunk => {
      if (/template|standardiz|starter kit|reusable|manual reconstruction|quality gate/i.test(chunk)) matchedSignals.push({ signal: 'standardization signal', text: chunk });
      if (/ai|use case|readiness|data|planning|reporting|automation/i.test(chunk)) matchedSignals.push({ signal: 'ai transformation signal', text: chunk });
      if (/stalled|governance|decision|sponsor|accountability|alignment|momentum/i.test(chunk)) matchedSignals.push({ signal: 'transformation inertia signal', text: chunk });
      if (/partial|weak|qualitative|incomplete|estimated/i.test(chunk)) matchedSignals.push({ signal: 'evidence weakness', text: chunk });
    });
    return {
      name: file.name,
      type: file.type || inferFileType(file.name),
      signals: matchedSignals.slice(0, 3),
      influence: Math.min(98, 55 + matchedSignals.length * 11 + (file.name.toLowerCase().includes('brief') ? 8 : 0)),
    };
  }).sort((a,b) => b.influence - a.influence);

  const archetypeMap = {
    standardization: {
      projectClass: 'Delivery Standardization / Engagement Startup Design',
      tags: ['standardization', 'reusable IP', 'startup consistency', 'human-in-the-loop'],
      frameworks: ['Operating Model Friction Map', 'Transformation Diagnostic Framework'],
      archetypes: ['Professional Services Standardization Archetype'],
      templates: ['Engagement Starter Kit Template', 'Diagnostic Workplan Template', 'Interview Guide Template', 'Storyline Skeleton Template'],
      governance: ['Evidence Sufficiency Rule', 'Human Review Gate Policy', 'Scope Discipline Rule'],
      recommendation: 'Build a reusable first-mile startup kit with explicit quality gates and archetype-based asset activation.',
      workplan: ['Week 1: startup friction scan and asset inventory', 'Week 2: classify repeatable startup moments and governance gaps', 'Week 3: draft starter kit, interview guide, and storyline skeleton', 'Week 4: run pilot review with practice leads and tighten evidence thresholds'],
      interviewGuide: ['COO or service line lead on desired consistency vs flexibility', 'Practice leaders on where startup reconstruction slows teams', 'Managers on workplan reuse and deck search behavior', 'Junior consultants on missing starting materials and review bottlenecks'],
      storyline: ['Why startup inconsistency is now an operating problem', 'What firm methods already exist and why reuse is uneven', 'Which startup moments can be standardized safely', 'What human review gates protect senior judgment'],
    },
    ai: {
      projectClass: 'AI Enablement / Practical First-Wave Diagnostic',
      tags: ['ai readiness', 'use case prioritization', 'data ownership', 'wave-one roadmap'],
      frameworks: ['Use Case Prioritization Matrix', 'Transformation Diagnostic Framework'],
      archetypes: ['Industrial AI Enablement Archetype'],
      templates: ['Use Case Scorecard Template', 'Diagnostic Workplan Template', 'Executive Steering Memo Template'],
      governance: ['Evidence Sufficiency Rule', 'Human Review Gate Policy', 'Scope Discipline Rule'],
      recommendation: 'Start with readiness and use-case sequencing, not a broad enterprise AI program.',
      workplan: ['Week 1: readiness diagnostic across data, reporting, and workflow', 'Week 2: map candidate pilots and score value vs feasibility', 'Week 3: align sponsors on first-wave sequence and dependencies', 'Week 4: draft steering memo, pilot scorecard, and review gates'],
      interviewGuide: ['COO on what visible value is needed within 6 months', 'Ops leaders on planning and reporting pain points', 'IT or data owners on ownership gaps and constraints', 'Plant or process leads on where manual coordination is slowing performance'],
      storyline: ['Why AI ambition is outpacing readiness today', 'Where workflow and reporting friction block value capture', 'Which pilots create visible value without overreach', 'What governance and capability gaps must be closed first'],
    },
    inertia: {
      projectClass: 'Transformation Inertia / Sponsorship Reset',
      tags: ['sponsor ambiguity', 'governance reset', 'first-wave prioritization', 'momentum'],
      frameworks: ['Transformation Diagnostic Framework', 'Stakeholder Alignment Map'],
      archetypes: ['Transformation Inertia Removal Archetype'],
      templates: ['Executive Steering Memo Template', 'Diagnostic Workplan Template', 'Storyline Skeleton Template'],
      governance: ['Stakeholder Coverage Rule', 'Human Review Gate Policy', 'Hypothesis Language Rule'],
      recommendation: 'Shrink the transformation agenda, clarify sponsor roles, and reset governance around a decision-producing first wave.',
      workplan: ['Week 1: map stall points, governance loops, and unclear decision rights', 'Week 2: interview sponsors and identify competing first-wave narratives', 'Week 3: define a focused agenda and sponsorship model', 'Week 4: assemble steering memo, risk log, and review-ready storyline'],
      interviewGuide: ['CEO or top sponsor on what momentum means', 'Operations and technology leads on conflicting priorities', 'Program office on where governance stalls or loops', 'Business leaders on why quick wins are hard to launch today'],
      storyline: ['Why ambition has not become execution', 'Where alignment and decision rights break down', 'Which first-wave choices reduce inertia fastest', 'How governance must change to sustain momentum'],
    }
  };

  const recipe = archetypeMap[classification.primary];

  const firmFrameworks = FIRM_LIBRARY.frameworks
    .filter(item => recipe.frameworks.includes(item.name))
    .map((item, idx) => ({ ...item, fit: Math.min(97, classification.confidence - idx * 4 + (hasGovernanceRisk ? 2 : 0)) }));
  const matchedArchetypes = FIRM_LIBRARY.archetypes
    .filter(item => recipe.archetypes.includes(item.name))
    .map(item => ({ ...item, fit: classification.confidence - 2 }));
  const matchedTemplates = FIRM_LIBRARY.templates
    .filter(item => recipe.templates.includes(item.name))
    .map((item, idx) => ({ ...item, fit: Math.min(95, classification.confidence - 6 - idx * 3) }));
  const matchedGovernance = FIRM_LIBRARY.governanceRules
    .filter(item => recipe.governance.includes(item.name))
    .map((item, idx) => ({ ...item, fit: Math.min(93, 84 - idx * 4 + (hasWeakEvidence ? 6 : 0)) }));

  const warnings = [];
  if (!hasBaseline) warnings.push({ severity: 'high', label: 'Missing baseline metrics', detail: 'No reporting baseline file was found, so any quantified improvement claim should stay provisional.' });
  if (!hasStakeholders) warnings.push({ severity: 'high', label: 'Missing stakeholder information', detail: 'No reliable sponsor or stakeholder note is available, which weakens interview planning and governance confidence.' });
  if (hasWeakEvidence) warnings.push({ severity: 'medium', label: 'Weak evidence in client materials', detail: 'Several client notes use partial or qualitative evidence, so claims should be framed as hypotheses.' });
  if (classification.primary === 'inertia') warnings.push({ severity: 'high', label: 'Sponsor ambiguity requires review', detail: 'Transformation recommendations should not circulate without confirming who owns first-wave decisions.' });
  if (classification.primary === 'ai') warnings.push({ severity: 'medium', label: 'Unsupported quantified AI value claims', detail: 'Pilot value estimates appear directional only. Add baseline assumptions before quantifying impact.' });
  if (classification.primary === 'standardization') warnings.push({ severity: 'medium', label: 'Governance uncertainty around reusable assets', detail: 'Client materials suggest reusable methods exist, but ownership for approving or updating starter-kit assets is still unclear.' });
  if (warnings.length === 0) warnings.push({ severity: 'low', label: 'Proceed with standard human review', detail: 'No acute evidence gap detected, but client-facing recommendations still require human validation.' });

  const whyDifferent = [
    `Firm Library assets stayed constant, but ${folder.folderName} introduced keywords such as ${keywords.slice(0, 4).join(', ')} that changed the engagement classification.`,
    `${evidence[0]?.name || 'Client files'} and ${evidence[1]?.name || 'supporting materials'} supplied the strongest evidence, which shifted framework and template prioritization.`,
    hasBaseline ? 'A reporting baseline file was present, so starter-kit work can include directional measurement language.' : 'No clear baseline file was found, so review warnings now emphasize quantified-claim risk.',
    hasStakeholders ? 'Stakeholder notes were available, allowing a more specific interview guide and governance framing.' : 'Stakeholder coverage is weak, so the human review gate is stricter and the interview guide stays more exploratory.',
  ];

  return {
    classification,
    projectClass: recipe.projectClass,
    tags: recipe.tags,
    recommendation: recipe.recommendation,
    matched: { frameworks: firmFrameworks, archetypes: matchedArchetypes, templates: matchedTemplates, governance: matchedGovernance },
    evidence,
    fileTypes,
    hasBaseline,
    hasStakeholders,
    hasWeakEvidence,
    whyDifferent,
    starterKit: {
      archetypeRecommendation: `${matchedArchetypes[0]?.name || recipe.archetypes[0]} (${classification.confidence}% fit)`,
      workplan: recipe.workplan,
      interviewGuide: recipe.interviewGuide,
      storyline: recipe.storyline,
      reviewChecklist: [
        hasBaseline ? 'Baseline evidence reviewed before quantifying claims' : 'Add or request baseline metrics before any quantified benefit claim',
        hasStakeholders ? 'Sponsor and stakeholder coverage appears adequate for first-pass interviews' : 'Confirm sponsor, stakeholder map, and decision rights before final recommendation',
        hasWeakEvidence ? 'Frame all impact statements as hypotheses pending validation' : 'Evidence quality supports a sharper first-pass narrative',
        'Require human review for final client-facing storyline and recommendations',
      ]
    },
    warnings,
    keywords,
  };
}

function useClientFolders() {
  const [selectedId, setSelectedId] = useState(PRESET_CLIENTS[0].id);
  const [uploadedFiles, setUploadedFiles] = useState([]);
  const fileInputRef = useRef(null);

  const selectedPreset = PRESET_CLIENTS.find(client => client.id === selectedId) || PRESET_CLIENTS[0];
  const currentFolder = useMemo(() => {
    if (!uploadedFiles.length) return selectedPreset;
    return {
      id: 'custom-upload',
      label: 'Custom Upload',
      folderName: `Custom Upload / ${uploadedFiles.length} file${uploadedFiles.length > 1 ? 's' : ''}`,
      sourceType: 'Local Upload mapped as Google Drive client folder',
      lastRefreshed: 'Just now',
      files: uploadedFiles,
    };
  }, [selectedPreset, uploadedFiles]);

  async function onUpload(event) {
    const files = Array.from(event.target.files || []);
    const resolved = await Promise.all(files.map(async (file) => ({
      name: file.name,
      type: inferFileType(file.name),
      size: file.size,
      content: await file.text().catch(() => `${file.name} uploaded`),
    })));
    setUploadedFiles(resolved);
  }

  function clearUploads() {
    setUploadedFiles([]);
    if (fileInputRef.current) fileInputRef.current.value = '';
  }

  return { selectedId, setSelectedId, currentFolder, uploadedFiles, onUpload, clearUploads, fileInputRef };
}

function Badge({ children, tone = 'indigo' }) {
  return <span className={`badge ${tone}`}>{children}</span>;
}

function ProgressBar({ value }) {
  return <div className="bar"><span style={{ width: `${value}%` }} /></div>;
}

function SeverityBadge({ severity }) {
  const map = { high: 'rose', medium: 'amber', low: 'emerald' };
  return <Badge tone={map[severity] || 'indigo'}>{severity.toUpperCase()}</Badge>;
}

function AssetList({ title, items, field = 'summary', tone = 'indigo' }) {
  return (
    <div className="stack">
      <div className="between">
        <div className="section-title">{title}</div>
        <Badge tone={tone}>{items.length} matched</Badge>
      </div>
      {items.map(item => (
        <div key={item.id || item.name} className="asset-item stack">
          <div className="between">
            <div>
              <div style={{ fontWeight: 700 }}>{item.name}</div>
              <div className="small muted" style={{ marginTop: 4 }}>{item.category || item.type || item.trigger}</div>
            </div>
            <div style={{ minWidth: 100, textAlign: 'right' }}>
              <div className="small highlight">{item.fit}% fit</div>
            </div>
          </div>
          <ProgressBar value={item.fit || 80} />
          <div className="small muted">{item[field] || item.summary || item.trigger}</div>
        </div>
      ))}
    </div>
  );
}
